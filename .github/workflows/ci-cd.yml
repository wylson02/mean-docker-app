name: CI/CD - getting-started-app

on:
  push:
    branches: [main]

jobs:
  # ---------- CI : construit l'image et la publie sur Docker Hub ----------
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push de l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/getting-started:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/getting-started:${{ github.sha }}

  # ---------- CD : déploie sur TON cluster Kubernetes local ----------
  deploy:
    needs: build-and-push
    runs-on: self-hosted # <-- tourne sur TON PC, pas sur les serveurs GitHub
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Appliquer les manifests Kubernetes
        run: kubectl apply -f k8s/

      - name: Forcer le redéploiement avec la nouvelle image
        run: |
          kubectl set image deployment/app app=${{ secrets.DOCKERHUB_USERNAME }}/getting-started:${{ github.sha }}
          kubectl rollout status deployment/app
